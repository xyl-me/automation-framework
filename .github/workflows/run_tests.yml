name: UI + API Automation Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'   # 每天凌晨2点运行

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run UI tests (headless)
        run: pytest tests/ui_tests/ --headless --alluredir=allure-results-ui
      - name: Upload UI test results
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: allure-results-ui

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run API tests
        run: pytest tests/api_tests/ --alluredir=allure-results-api
      - name: Upload API test results
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: allure-results-api

  generate-report:
    runs-on: ubuntu-latest
    needs: [ ui-tests, api-tests ]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download UI results
        uses: actions/download-artifact@v4
        with:
          name: ui-test-results
          path: allure-results-ui
      - name: Download API results
        uses: actions/download-artifact@v4
        with:
          name: api-test-results
          path: allure-results-api
      - name: Merge results
        run: |
          mkdir -p allure-results
          cp -r allure-results-ui/* allure-results/ 2>/dev/null || true
          cp -r allure-results-api/* allure-results/ 2>/dev/null || true
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.7
        with:
          allure_results: allure-results
          gh_pages: gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages